name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/
      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
      - name: Build release binary
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32s3 --output-dir release firmware/SmartCamOS/
      - name: Package release assets
        run: |
          mkdir -p release_assets
          cp release/SmartCamOS.ino.bin release_assets/
          cp -r web/ release_assets/dashboard/
          cp -r docs/ release_assets/docs/
          cd release_assets && sha256sum * > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          generate_release_notes: true
